[manager]
ratio         = [1, 3, 4]
sort_by       = "natural"
sort_sensitive = false
sort_reverse  = false
sort_dir_first = true
sort_translit = true
linemode      = "size"
show_hidden   = true
show_symlink  = true
scrolloff     = 5

[preview]
max_width  = 1000
max_height = 1000

[opener]
edit = [
  { run = '${EDITOR:-nvim} "$@"', block = true, for = "unix" },
]

[[plugin.prepend_fetchers]]
id  = "git"
url = "*"
run = "git"

[[plugin.prepend_fetchers]]
id  = "git"
url = "*/"
run = "git"
