[runtime]
watcher_on_save = "lazy"
std_stream_max_bytes = 1000000
default_sql_output = "auto"
reactive_tests = true
on_cell_change = "autorun"
auto_reload = "autorun"
auto_instantiate = true
output_max_bytes = 8000000

[display]
dataframes = "rich"
cell_output = "above"
code_editor_font_size = 14
default_table_page_size = 10
default_width = "medium"
theme = "light"

[snippets]
custom_paths = []
include_default_snippets = true

[server]
browser = "default"
follow_symlink = false

[save]
format_on_save = false
autosave = "off"
autosave_delay = 1000

[ai]
rules = ""

[keymap]
preset = "vim"

[keymap.overrides]

[language_servers.pylsp]
enable_pyflakes = false
enable_mypy = true
enable_ruff = true
enable_flake8 = false
enable_pylint = false
enabled = true
enable_pydocstyle = false

[diagnostics]

[formatting]
line_length = 79

[package_management]
manager = "pip"

[completion]
activate_on_typing = true
copilot = false

[experimental]
