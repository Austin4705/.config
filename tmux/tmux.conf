# Make <C-s> the binding because <C-b> is dumb
set -g prefix C-s
unbind C-b
bind C-s send-prefix
#
# bind r source-file ~/.tmux.conf \

# Some splitting that makes sense and isn't out of reach
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind Enter split-window -h -c "#{pane_current_path}"

# Vim movement between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Vim movement to slightly adjust panes
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

set -g status-right-length 70

# Give vim bindings in copy mode
setw -g mode-keys vi

bind v copy-mode

# # Once in copy mode, 'jk' returns you to the prompt
# bind-key -T copy-mode-vi j send-keys -X cursor-down # keep 'j' working
# bind-key -T copy-mode-vi k send-keys -X cursor-up   # keep 'k' working
# bind-key -T copy-mode-vi 'j' if-shell -F '#{selection_present}' 'send-keys -X cursor-down' 'switch-client -T jk_timeout'
# bind-key -T jk_timeout 'k' send-keys -X cancel
# bind-key -T jk_timeout 'j' send-keys -X cursor-down

# Because people try to scroll
set -g mouse on

# Copy contents of tmux's copy mode into system clipboard
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard"

###########
# SpaceDuck
###########
# Default bar color
set-option -g status-style bg='#1b1c36',fg='#ecf0c1'

# Active Pane
set -g pane-active-border-style "fg=#5ccc96"

# Inactive Pane
set -g pane-border-style "fg=#686f9a"

# Active window
set-option -g window-status-current-style bg='#686f9a',fg='#ffffff'

# Message
set-option -g message-style bg='#686f9a',fg='#ecf0c1'
set-option -g message-command-style bg='#686f9a',fg='#ecf0c1'

# When Commands are run
set -g message-style "fg=#0f111b,bg=#686f9a"

set -g allow-passthrough all


#########
# Plugins
#########



set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.config/tmux/plugins/tpm/tpm'
