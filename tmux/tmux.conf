set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB"
set -ga terminal-overrides ",xterm-kitty:Tc"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[6 q'
set -g cursor-style bar

# QoL
set -sg escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g allow-rename off

# Make <C-s> the binding because <C-b> is dumb
set -g prefix C-s
unbind C-b
bind C-s send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Popup scratch terminal and lazygit
bind C-t display-popup -h 60% -w 60% -E
bind g display-popup -h 80% -w 80% -E "lazygit"

# Some splitting that makes sense and isn't out of reach
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind Enter split-window -h -c "#{pane_current_path}"

# Vim movement between panes (kept as fallback; vim-tmux-navigator handles C-h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Quick toggle between last window / last session
bind Tab last-window
bind BTab switch-client -l

# Built-in tree view for all sessions/windows/panes
bind s choose-tree -sZ

# Name and create a new session in one step
bind C-n command-prompt -p "new session:" "new-session -s '%%'"

# Kill current session with confirmation, then jump to next
bind X confirm-before -p "kill session #S? (y/n)" "run-shell 'tms kill'"

# Repeatable pane resizing (hold key after prefix)
set -g repeat-time 600
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# Fine-grained resize without prefix (Alt+Shift+h/j/k/l)
bind -n M-H resize-pane -L 1
bind -n M-J resize-pane -D 1
bind -n M-K resize-pane -U 1
bind -n M-L resize-pane -R 1

# Swap panes
bind S-Left swap-pane -U
bind S-Right swap-pane -D

# Break pane to its own window / pull last pane back in
bind B break-pane
bind @ join-pane -s !

# Vim bindings in copy mode
setw -g mode-keys vi

bind v copy-mode

set -g mouse on

# Visual selection / yank like vim, using macOS clipboard
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Incremental search in copy mode
bind -T copy-mode-vi / command-prompt -i -p "search:" "send -X search-forward-incremental '%%%'"
bind -T copy-mode-vi ? command-prompt -i -p "search back:" "send -X search-backward-incremental '%%%'"

###########
# SpaceDuck
###########

set -g pane-active-border-style "fg=#5ccc96"
set -g pane-border-style "fg=#686f9a"
set-option -g message-style "bg=#686f9a,fg=#ecf0c1"
set-option -g message-command-style "bg=#686f9a,fg=#ecf0c1"

# ── Status bar (from github.com/Haadi-Khan/.config) ─────
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

BG=#1b1c36
FG=#ecf0c1
STATUS_SESSION_BG=#5ccc96
STATUS_WIN_NUM_BG=#686f9a
STATUS_WIN_TXT_BG=#30365F
STATUS_SEL_WIN_NUM_BG=#b3a1e6
STATUS_SEL_WIN_TXT_BG=#30365F

set-option -g status-position bottom
set-option -g status-style fg=$FG,bg=$BG
set-option -g status-justify "absolute-centre"
set-option -g status-left-style none
set-option -g status-left-length "80"
set-option -g status-left "#[fg=$STATUS_SESSION_BG,bg=$BG]#[bg=$STATUS_SESSION_BG,fg=$BG,bold] #S #[fg=$STATUS_SESSION_BG,bg=$BG,nobold] "
set -g status-right ''
set -g window-status-separator " "
set-window-option -g window-status-format "#[fg=$STATUS_WIN_NUM_BG,bg=$BG]#[bg=$STATUS_WIN_NUM_BG,fg=$BG] #I #[bg=$STATUS_WIN_TXT_BG,fg=$FG] #W #[fg=$STATUS_WIN_TXT_BG,bg=$BG]"
set-window-option -g window-status-current-format "#[fg=$STATUS_SEL_WIN_NUM_BG,bg=$BG]#[bg=$STATUS_SEL_WIN_NUM_BG,fg=$BG,bold] #I #[bg=$STATUS_WIN_TXT_BG,fg=$FG,nobold] #W #[fg=$STATUS_WIN_TXT_BG,bg=$BG]"

bind i split-window -h -l 30% -c "#{pane_current_path}"

# Layout presets
bind D split-window -h -l 30% -c "#{pane_current_path}" "tdf"
bind M-d split-window -v -l 25% -c "#{pane_current_path}"
bind C-p display-popup -E "ls ~/.config/tmux/layouts/ | fzf --prompt='layout> ' | xargs -I{} bash ~/.config/tmux/layouts/{}"

set -g allow-passthrough all
set -g extended-keys on
set -ga terminal-features 'xterm*:extkeys'


#########
# Plugins
#########



set-environment -g PATH "/Users/austinwu/.cargo/bin:/opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin"
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'

# tmux-thumbs: press prefix+Space to highlight copyable hints (URLs, paths, hashes)
set -g @thumbs-key Space

# tmux-fzf: prefix+F to open fzf for sessions, windows, panes, etc.
TMUX_FZF_LAUNCH_KEY="F"

# tms (tmux-sessionizer) keybindings
bind C-o display-popup -E "tms"
bind C-j display-popup -E "tms switch"
bind C-w display-popup -E "tms windows"

run '~/.config/tmux/plugins/tpm/tpm'
