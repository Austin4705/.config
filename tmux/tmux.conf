set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[6 q'
set -g cursor-style bar

# Make <C-s> the binding because <C-b> is dumb
set -g prefix C-s
unbind C-b
bind C-s send-prefix
#
# bind r source-file ~/.tmux.conf \

# Some splitting that makes sense and isn't out of reach
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind Enter split-window -h -c "#{pane_current_path}"

# Vim movement between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Vim movement to slightly adjust panes
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Give vim bindings in copy mode
setw -g mode-keys vi

bind v copy-mode

# # Once in copy mode, 'jk' returns you to the prompt
# bind-key -T copy-mode-vi j send-keys -X cursor-down # keep 'j' working
# bind-key -T copy-mode-vi k send-keys -X cursor-up   # keep 'k' working
# bind-key -T copy-mode-vi 'j' if-shell -F '#{selection_present}' 'send-keys -X cursor-down' 'switch-client -T jk_timeout'
# bind-key -T jk_timeout 'k' send-keys -X cancel
# bind-key -T jk_timeout 'j' send-keys -X cursor-down

# Because people try to scroll
set -g mouse on

# Copy contents of tmux's copy mode into system clipboard
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard"

###########
# SpaceDuck
###########

set -g pane-active-border-style "fg=#5ccc96"
set -g pane-border-style "fg=#686f9a"
set-option -g message-style "bg=#686f9a,fg=#ecf0c1"
set-option -g message-command-style "bg=#686f9a,fg=#ecf0c1"

# ── Status bar (from github.com/Haadi-Khan/.config) ─────
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

BG=#1b1c36
FG=#ecf0c1
STATUS_SESSION_BG=#5ccc96
STATUS_WIN_NUM_BG=#686f9a
STATUS_WIN_TXT_BG=#30365F
STATUS_SEL_WIN_NUM_BG=#b3a1e6
STATUS_SEL_WIN_TXT_BG=#30365F

set-option -g status-position bottom
set-option -g status-style fg=$FG,bg=$BG
set-option -g status-justify "absolute-centre"
set-option -g status-left-style none
set-option -g status-left-length "80"
set-option -g status-left "#[fg=$STATUS_SESSION_BG,bg=$BG]#[bg=$STATUS_SESSION_BG,fg=$BG,bold] #S #[fg=$STATUS_SESSION_BG,bg=$BG,nobold] "
set -g status-right ''
set -g window-status-separator " "
set-window-option -g window-status-format "#[fg=$STATUS_WIN_NUM_BG,bg=$BG]#[bg=$STATUS_WIN_NUM_BG,fg=$BG] #I #[bg=$STATUS_WIN_TXT_BG,fg=$FG] #W #[fg=$STATUS_WIN_TXT_BG,bg=$BG]"
set-window-option -g window-status-current-format "#[fg=$STATUS_SEL_WIN_NUM_BG,bg=$BG]#[bg=$STATUS_SEL_WIN_NUM_BG,fg=$BG,bold] #I #[bg=$STATUS_WIN_TXT_BG,fg=$FG,nobold] #W #[fg=$STATUS_WIN_TXT_BG,bg=$BG]"

set -g allow-passthrough all


#########
# Plugins
#########



set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.config/tmux/plugins/tpm/tpm'
